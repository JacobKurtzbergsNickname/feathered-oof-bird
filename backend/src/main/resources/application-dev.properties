# ── Dev profile overrides ─────────────────────────────────────────────────────
# This file is intentionally committed to version control.
# It contains dev-only defaults that allow the app to boot locally without
# any external services configured.  Never put production values here.

# Auth: disable JWT in dev — SecurityConfig uses DevAuthenticationProvider instead.
# These placeholder values satisfy @NotBlank validation on AppConfig.Auth so that
# the context starts cleanly in the dev profile.
app.auth.issuer-uri=https://dev-placeholder.auth0.com/
app.auth.audience=dev-audience
spring.security.oauth2.resourceserver.jwt.issuer-uri=

# PostgreSQL: supply the docker-compose password as a dev default so that
# developers can run `docker-compose up` without manually exporting DB_PASSWORD.
# Override by setting DB_PASSWORD in your shell if you use a different password.
spring.datasource.password=${DB_PASSWORD:Y0uYuM40D3Q14nN140!}

# Logging: more verbose in dev
logging.level.com.paypalclone.featheredoofbird=DEBUG
logging.level.org.springframework.security=DEBUG
